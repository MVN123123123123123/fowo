name: Build RPM

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # We use a container that has rpmbuild available, like Fedora, 
    # to easily build RPMs without installing rpm-build on Ubuntu.
    container: fedora:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y rpm-build git findutils tar gzip

      - name: Install Adoptium JDK 21
        run: |
          curl -fsSL -o /tmp/jdk21.tar.gz \
            "https://api.adoptium.net/v3/binary/latest/21/ga/linux/x64/jdk/hotspot/normal/eclipse?project=jdk"
          mkdir -p /opt/jdk21
          tar -xzf /tmp/jdk21.tar.gz -C /opt/jdk21 --strip-components=1
          rm /tmp/jdk21.tar.gz

      - name: Build Fat JAR
        run: |
          export JAVA_HOME=/opt/jdk21
          export PATH="$JAVA_HOME/bin:$PATH"
          ./gradlew shadowJar

      - name: Setup rpmbuild directories
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          
      - name: Copy files to SOURCES
        run: |
          cp build/libs/fowo-all.jar ~/rpmbuild/SOURCES/
          cp asroot ~/rpmbuild/SOURCES/
          
      - name: Build RPM
        run: |
          rpmbuild -ba fowo.spec
          
      - name: Upload RPM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fowo-rpm
          path: ~/rpmbuild/RPMS/noarch/*.rpm
          retention-days: 14
